services:
  crawler-service:
    build:
      context: ..
      # Thư mục package trên disk là order_managerment_crawl (không phải order_crawl — tên remote repo có thể khác)
      dockerfile: order_managerment_crawl/Dockerfile
    container_name: order-management-crawler
    init: true
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - BACKEND_API_URL=http://order_management_backend:3000/api
      - DISPLAY=:99
      - CHROME_BIN=/usr/bin/google-chrome
      - CHROME_PATH=/usr/bin/google-chrome
      - CHROMEDRIVER_PATH=/usr/bin/chromedriver
      - CRAWL_NEW_DIR=/app/order_crawl/crawl_new
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 3G
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./crawl_new/config:/app/order_crawl/crawl_new/config:ro
      - pandamall_sessions:/app/logs/sessions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - crawler-network

networks:
  crawler-network:
    driver: bridge

volumes:
  pandamall_sessions:
